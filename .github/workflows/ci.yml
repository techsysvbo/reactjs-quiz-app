jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Echo ticket context
        run: echo "Running CI for KAN-linked test"

      - name: Basic validation
        run: |
          echo "Lint/test placeholder"
          python --version || true

  deploy-dev:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Simulated deploy
        run: echo "Deploying to dev"
